version: 2
updates:
- package-ecosystem: pip
  directory: "/"
  cooldown:
    default-days: 7
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  assignees:
  - thenativeweb/internal_dev
  labels:
  - Dependencies
  commit-message:
    prefix: chore

- package-ecosystem: docker
  directory: "/tests/shared/docker/eventsourcingdb"
  cooldown:
    default-days: 7
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  assignees:
  - thenativeweb/internal_dev
  labels:
  - Dependencies
  commit-message:
    prefix: chore

- package-ecosystem: "github-actions"
  directory: "/"
  cooldown:
    default-days: 7
  schedule:
    interval: weekly
  open-pull-requests-limit: 10
  assignees:
  - thenativeweb/internal_dev
  labels:
  - Dependencies
  commit-message:
    prefix: chore
